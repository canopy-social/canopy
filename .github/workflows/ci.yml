name: Canopy CI

on:
  push:
    branches:
      - main
      - 'feature/*'
  pull_request:
    branches:
      - main
      - 'feature/*'

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Verify Dependencies
        run: go mod verify

      - name: Run Vet
        run: go vet ./...

      - name: Run Tests
        run: go test -v ./...

  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # We only run Node environment and npm tasks if the web/ directory actually exists.
      # This prevents failures before the project is scaffolded in Phase 1.12.
      - name: Check if web directory exists
        id: check_web
        run: |
          if [ -d "web" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        if: steps.check_web.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install Dependencies
        if: steps.check_web.outputs.exists == 'true'
        working-directory: web
        run: npm ci

      - name: Run Linter
        if: steps.check_web.outputs.exists == 'true'
        working-directory: web
        run: npm run lint

      - name: Run Build
        if: steps.check_web.outputs.exists == 'true'
        working-directory: web
        run: npm run build
